<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Native Crop & Screenshot System</title>
    <style>
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg: #f8fafc;
        --text: #0f172a;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      #capture-target {
        background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        width: 100%;
        max-width: 400px;
        border: 1px solid #e2e8f0;
        position: relative;
        height: fit-content;
      }

      #crop-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 16px;
        cursor: crosshair;
        display: none;
        z-index: 10;
      }

      #crop-box {
        position: absolute;
        border: 2px dashed #fff;
        background: rgba(255, 255, 255, 0.2);
        display: none;
        pointer-events: none;
      }

      .receipt-header {
        text-align: center;
        border-bottom: 2px dashed #cbd5e1;
        padding-bottom: 1rem;
        margin-bottom: 1rem;
      }
      .receipt-header h2 {
        margin: 0;
        color: var(--primary);
      }
      .receipt-header p {
        margin: 5px 0 0;
        color: #64748b;
        font-size: 0.875rem;
      }
      .item-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        font-family: monospace;
        font-size: 1.1rem;
      }
      .input-group {
        margin-top: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      input[type="text"] {
        padding: 0.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-family: inherit;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        width: fit-content;
      }

      button {
        padding: 0.75rem 1.5rem;
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        max-width: 300px;
      }

      button:hover {
        background-color: var(--primary-hover);
      }

      #result-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      canvas {
        border: 4px solid #fff;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        border-radius: 16px;
        max-width: 100%;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="capture-target">
      <div id="crop-overlay">
        <div id="crop-box"></div>
      </div>
      <img src="https://picsum.photos/200/300" crossorigin="anonymous" alt="" />
      <div class="receipt-header">
        <h2>Acme Corp</h2>
        <p>Order #99281-B</p>
      </div>
      <div class="item-row">
        <span>Flux Capacitor</span><span>$499.99</span>
      </div>
      <div class="item-row">
        <span>Plutonium (1 vial)</span><span>$1,200.00</span>
      </div>
      <div class="input-group">
        <label style="font-size: 0.875rem; font-weight: bold"
          >Customer Notes:</label
        >
        <input
          type="text"
          placeholder="Leave at the front door..."
          id="customer-note"
        />
      </div>
    </div>

    <div class="controls">
      <div
        style="
          background: white;
          padding: 1.5rem;
          border-radius: 12px;
          box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
          width: fit-content;
        "
      >
        <h3 style="margin-top: 0">Snipping Tool</h3>
        <button id="activateCropBtn">✂️ Select Area to Crop</button>
      </div>

      <div id="result-container">
        <canvas id="canvas-output"></canvas>
        <button
          id="downloadBtn"
          style="display: none; background-color: #10b981"
        >
          💾 Download PNG
        </button>
      </div>
    </div>

    <script>
      const activateCropBtn = document.getElementById("activateCropBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const canvas = document.getElementById("canvas-output");
      const ctx = canvas.getContext("2d");

      const overlay = document.getElementById("crop-overlay");
      const cropBox = document.getElementById("crop-box");
      const target = document.getElementById("capture-target");

      let isDrawing = false;
      let startX, startY;
      let cropCoordinates = null;

      activateCropBtn.addEventListener("click", () => {
        overlay.style.display = "block";
        cropBox.style.display = "none";
        activateCropBtn.textContent = "Draw a box on the left...";
        activateCropBtn.disabled = true;
      });

      overlay.addEventListener("mousedown", (e) => {
        isDrawing = true;
        const rect = overlay.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;

        cropBox.style.left = startX + "px";
        cropBox.style.top = startY + "px";
        cropBox.style.width = "0px";
        cropBox.style.height = "0px";
        cropBox.style.display = "block";
      });

      overlay.addEventListener("mousemove", (e) => {
        if (!isDrawing) return;
        const rect = overlay.getBoundingClientRect();
        const currentX = e.clientX - rect.left;
        const currentY = e.clientY - rect.top;

        const width = Math.abs(currentX - startX);
        const height = Math.abs(currentY - startY);
        const left = Math.min(currentX, startX);
        const top = Math.min(currentY, startY);

        cropBox.style.width = width + "px";
        cropBox.style.height = height + "px";
        cropBox.style.left = left + "px";
        cropBox.style.top = top + "px";
      });

      overlay.addEventListener("mouseup", (e) => {
        isDrawing = false;
        overlay.style.display = "none";

        cropCoordinates = {
          x: parseInt(cropBox.style.left),
          y: parseInt(cropBox.style.top),
          w: parseInt(cropBox.style.width),
          h: parseInt(cropBox.style.height),
        };

        if (cropCoordinates.w > 10 && cropCoordinates.h > 10) {
          takeScreenshot("capture-target", cropCoordinates);
        } else {
          activateCropBtn.textContent = "✂️ Select Area to Crop";
          activateCropBtn.disabled = false;
        }
      });

      // Helper: Extract Base64 directly from an existing DOM image using a temporary canvas
      function getBase64FromImage(imgEl) {
        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = imgEl.naturalWidth || imgEl.width;
        tempCanvas.height = imgEl.naturalHeight || imgEl.height;
        
        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.drawImage(imgEl, 0, 0);
        
        return tempCanvas.toDataURL("image/png"); 
      }

      function takeScreenshot(elementId, crop) {
        activateCropBtn.textContent = "⏳ Processing...";

        const element = document.getElementById(elementId);
        const fullWidth = element.offsetWidth;
        const fullHeight = element.offsetHeight;
        const dpr = window.devicePixelRatio || 1;

        canvas.width = crop.w * dpr;
        canvas.height = crop.h * dpr;
        canvas.style.width = crop.w + "px";
        canvas.style.height = crop.h + "px";

        const clone = element.cloneNode(true);

        const originalImages = element.querySelectorAll("img");
        const clonedImages = clone.querySelectorAll("img");
        
        clonedImages.forEach((clonedImg, index) => {
          const originalImg = originalImages[index];
          
          if (originalImg.complete && originalImg.naturalWidth > 0) {
            try {
              clonedImg.src = getBase64FromImage(originalImg);
            } catch (error) {
              console.error("Canvas tainted! Did you add crossorigin='anonymous' to the <img> tag?", error);
            }
          }
        });

        const originalInputs = element.querySelectorAll("input, textarea");
        const clonedInputs = clone.querySelectorAll("input, textarea");
        originalInputs.forEach((input, index) => {
          clonedInputs[index].setAttribute("value", input.value);
        });

        const clonedOverlay = clone.querySelector("#crop-overlay");
        if (clonedOverlay) clonedOverlay.remove();

        const computedStyle = window.getComputedStyle(element);
        const fontFamily = computedStyle.fontFamily;
        let cssStyles = "";

        Array.from(document.styleSheets).forEach((sheet) => {
          try {
            Array.from(sheet.cssRules).forEach((rule) => {
              cssStyles += rule.cssText;
            });
          } catch (e) {
            console.warn("Skipping a stylesheet due to CORS restrictions.");
          }
        });

        const serializer = new XMLSerializer();
        clone.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
        const elementHtml = serializer.serializeToString(clone);

        const svgData = `
                <svg xmlns="http://www.w3.org/2000/svg" width="${fullWidth}" height="${fullHeight}">
                    <foreignObject width="100%" height="100%">
                        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: ${fontFamily}; width: ${fullWidth}px; height: ${fullHeight}px;">
                            <style>${cssStyles}</style>
                            ${elementHtml}
                        </div>
                    </foreignObject>
                </svg>
            `;

        const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgData);
        const img = new Image();

        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          ctx.drawImage(
            img,
            crop.x,
            crop.y,
            crop.w,
            crop.h,
            0,
            0,
            canvas.width,
            canvas.height,
          );

          canvas.style.display = "block";
          downloadBtn.style.display = "flex";

          activateCropBtn.textContent = "✂️ Select Area to Crop";
          activateCropBtn.disabled = false;
        };

        img.src = url;
      }

      downloadBtn.addEventListener("click", () => {
        const link = document.createElement("a");
        link.download = `crop-${new Date().getTime()}.png`;
        link.href = canvas.toDataURL("image/png");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    </script>
  </body>
</html>
