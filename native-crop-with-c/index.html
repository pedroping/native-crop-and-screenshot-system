      * {
        font-family: "PlaywriteIE-Regular";
        font-weight: normal;
        font-style: normal;
      }

      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg: #f8fafc;
        --text: #0f172a;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      #capture-target {
        background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        width: 100%;
        max-width: 400px;
        border: 1px solid #e2e8f0;
        position: relative;
        height: fit-content;
        max-height: 500px;
        overflow: auto;
      }

      #crop-overlay {
        position: fixed;
        top: calc(2rem + 8px);
        left: calc(2rem + 8px);
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 16px;
        cursor: crosshair;
        display: none;
        z-index: 10;
        width: 467px;
        height: 567px;
      }

      #crop-box {
        position: absolute;
        border: 2px dashed #fff;
        background: rgba(255, 255, 255, 0.2);
        display: none;
        pointer-events: none;
      }

      .receipt-header {
        text-align: center;
        border-bottom: 2px dashed #cbd5e1;
        padding-bottom: 1rem;
        margin-bottom: 1rem;
      }
      .receipt-header h2 {
        margin: 0;
        color: var(--primary);
      }
      .receipt-header p {
        margin: 5px 0 0;
        color: #64748b;
        font-size: 0.875rem;
      }
      .item-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        font-family: monospace;
        font-size: 1.1rem;
      }
      .input-group {
        margin-top: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      input[type="text"] {
        padding: 0.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-family: inherit;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        width: fit-content;
      }

      button {
        padding: 0.75rem 1.5rem;
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        max-width: 300px;
      }

      button:hover {
        background-color: var(--primary-hover);
      }

      #result-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      #canvas-output {
        border: 4px solid #fff;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        border-radius: 16px;
        max-width: 100%;
        display: none;
      }

      .scroll-area {
        overflow: auto;
        height: 100px;
      }
    </style>
  </head>
  <body>
    <div id="capture-target">
      <div id="crop-overlay">
        <div id="crop-box"></div>
      </div>
      <img
        src="https://picsum.photos/200/300"
        crossorigin="anonymous"
        alt=""
        style="border-radius: 8px; margin-bottom: 1rem"
      />

      <canvas
        id="canvas-01"
        style="
          display: block !important;
          border-radius: 8px;
          margin-bottom: 1rem;
        "
      ></canvas>

      <div class="scroll-area">
        <p>scroll-area 1</p>
        <p>scroll-area 2</p>
        <p>scroll-area 3</p>
        <p>scroll-area 4</p>
        <p>scroll-area 5</p>
      </div>

      <div class="receipt-header">
        <h2>Acme Corp</h2>
        <p>Order #99281-B</p>
      </div>
      <div class="item-row">
        <span>Flux Capacitor</span><span>$499.99</span>
      </div>
      <div class="item-row">
        <span>Plutonium (1 vial)</span><span>$1,200.00</span>
      </div>
      <div class="input-group">
        <label style="font-size: 0.875rem; font-weight: bold"
          >Customer Notes:</label
        >
        <input
          type="text"
          placeholder="Leave at the front door..."
          id="customer-note"
        />
      </div>
    </div>

    <div class="controls">
      <div
        style="
          background: white;
          padding: 1.5rem;
          border-radius: 12px;
          box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
          width: fit-content;
        "
      >
        <h3 style="margin-top: 0">Snipping Tool</h3>
        <button id="activateCropBtn">Select Area to Crop</button>
      </div>

      <div id="result-container">
        <canvas id="canvas-output"></canvas>
        <button
          id="downloadBtn"
          style="display: none; background-color: #10b981"
        >
          Download PNG
        </button>
      </div>
    </div>
    <script src="dist/index.js"></script>
    <script>
      const el = document.querySelector(".scroll-area");

      function onScroll() {
        console.log({ el });
        const parent = el.parentElement;
        const scrollTop = el.scrollTop;
        const newWrapper = document.createElement("div");
        const nextSibling = el.nextSibling;

        newWrapper.style.overflow = "auto";
        newWrapper.style.height = el.offsetHeight + "px";
        newWrapper.style.position = "relative";

        el.style.height = "auto";
        el.style.width = "100%";
        el.style.top = `-${scrollTop}px`;
        el.style.position = "absolute";

        parent.removeChild(el);
        newWrapper.appendChild(el);

        parent.insertBefore(newWrapper, nextSibling);
      }
    </script>
  </body>
</html>
