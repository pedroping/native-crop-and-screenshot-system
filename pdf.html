<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PDF.js Zoom System Example</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
      body {
        margin: 0;
        background-color: #ececec;
        /* Add padding so the top of the PDF isn't hidden behind the fixed toolbar */
        padding-top: 60px;
      }

      /* Fixed Toolbar Styling */
      #toolbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background-color: #333;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        z-index: 1000;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
        font-weight: bold;
      }

      #pdf-viewer {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        box-sizing: border-box;
        width: 350px;
        overflow: auto;
        margin: auto;
        position: relative;
      }

      .page-container {
        background-color: white;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      canvas {
        display: block;
      }

      .textLayer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="zoom-out">- Zoom Out</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in">+ Zoom In</button>
      <button id="zoom-fit">Fit to Screen</button>
    </div>

    <div id="pdf-viewer"></div>

    <script>
      const pdfjsLib = window["pdfjs-dist/build/pdf"];
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      const url =
        "https://pedro-ping-portfolio.vercel.app/assets/others/PEDRO_HENRIQUE_CHAVES_DIAS.pdf";

      let pdfDoc = null;
      let currentScale = 1.0;
      let fitScale = 1.0;
      let isRendering = false;

      async function initPDF() {
        try {
          const loadingTask = pdfjsLib.getDocument(url);
          pdfDoc = await loadingTask.promise;

          await calculateFitScale();
          currentScale = fitScale;

          renderDocument();
        } catch (error) {
          console.error("Error loading PDF:", error);
        }
      }

      async function calculateFitScale() {
        const viewer = document.getElementById("pdf-viewer");
        const containerWidth = viewer.clientWidth - 40;
        const maxDesiredWidth = Math.min(containerWidth, 1000);

        const page = await pdfDoc.getPage(1);
        const unscaledViewport = page.getViewport({ scale: 1.0 });

        fitScale = maxDesiredWidth / unscaledViewport.width;
      }

      async function renderDocument() {
        if (isRendering) return;
        isRendering = true;

        const viewer = document.getElementById("pdf-viewer");
        viewer.innerHTML = "";

        document.getElementById("zoom-level").innerText =
          `${Math.round(currentScale * 100)}%`;

        try {
          for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: currentScale });

            const pageContainer = document.createElement("div");
            pageContainer.className = "page-container";
            viewer.appendChild(pageContainer);

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            pageContainer.appendChild(canvas);

            const textLayerDiv = document.createElement("div");
            textLayerDiv.className = "textLayer";
            textLayerDiv.style.width = `${viewport.width}px`;
            textLayerDiv.style.height = `${viewport.height}px`;
            textLayerDiv.style.setProperty("--scale-factor", viewport.scale);
            pageContainer.appendChild(textLayerDiv);

            await page.render({ canvasContext: context, viewport: viewport })
              .promise;

            const textContent = await page.getTextContent();
            await pdfjsLib.renderTextLayer({
              textContentSource: textContent,
              container: textLayerDiv,
              viewport: viewport,
              textDivs: [],
            }).promise;
          }
        } catch (error) {
          console.error("Error rendering pages:", error);
        }

        isRendering = false;
      }

      document.getElementById("zoom-in").addEventListener("click", () => {
        if (currentScale >= 3.0) return;
        currentScale += 0.25;
        renderDocument();
      });

      document.getElementById("zoom-out").addEventListener("click", () => {
        if (currentScale <= 0.5) return;
        currentScale -= 0.25;
        renderDocument();
      });

      document.getElementById("zoom-fit").addEventListener("click", () => {
        currentScale = fitScale;
        renderDocument();
      });

      initPDF();
    </script>
  </body>
</html>
