<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Native HTML Screenshot System</title>
    <style>
      /* All these styles will be captured in the screenshot */
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 40px;
        background-color: #e9ecef;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #capture-area {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        border: 1px solid #dee2e6;
      }

      .badge {
        display: inline-block;
        padding: 5px 12px;
        background: #007bff;
        color: white;
        border-radius: 20px;
        font-size: 12px;
        margin-bottom: 10px;
      }

      h2 {
        margin: 0 0 10px 0;
        color: #333;
      }
      p {
        color: #666;
        line-height: 1.5;
      }

      .controls {
        margin-top: 30px;
        text-align: center;
      }

      button {
        padding: 12px 24px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.1s;
      }

      button:active {
        transform: scale(0.98);
      }

      #screenshot-result {
        margin-top: 40px;
        border: 2px solid #adb5bd;
        max-width: 100%;
        display: none; /* Hidden until first capture */
      }
    </style>
  </head>
  <body>
    <div id="capture-area">
      <span class="badge">Live Preview</span>
      <h2>Screenshot Target</h2>
      <p>
        This entire box is being styled by the page's CSS. When you click
        capture, the JavaScript will grab the DOM and the Styles simultaneously.
      </p>
      <hr />
      <ul style="color: #555">
        <li>No external libraries</li>
        <li>Native SVG foreignObject</li>
        <li>CSS Rule Cloning</li>
      </ul>
    </div>

    <div class="controls">
      <button id="captureBtn">📸 Capture Area to Canvas</button>
    </div>

    <h3>Canvas Result:</h3>
    <canvas id="screenshot-result"></canvas>

    <script>
      function takeScreenshot(elementId, canvasId) {
        const element = document.getElementById(elementId);
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext("2d");

        const width = element.offsetWidth;
        const height = element.offsetHeight;
        canvas.width = width;
        canvas.height = height;
        canvas.style.display = "block";

        // GET THE COMPUTED FONT OF THE ELEMENT
        const computedStyle = window.getComputedStyle(element);
        const fontFamily = computedStyle.fontFamily;

        let cssStyles = "";
        const styleSheets = Array.from(document.styleSheets);
        styleSheets.forEach((sheet) => {
          try {
            const rules = Array.from(sheet.cssRules);
            rules.forEach((rule) => (cssStyles += rule.cssText));
          } catch (e) {
            console.warn("Skipping a stylesheet due to CORS");
          }
        });

        const serializer = new XMLSerializer();
        const clone = element.cloneNode(true);
        const elementHtml = serializer.serializeToString(clone);

        const data = `
                <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
                    <foreignObject width="100%" height="100%">
                        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: ${fontFamily};">
                            <style>
                                ${cssStyles}
                            </style>
                            ${elementHtml}
                        </div>
                    </foreignObject>
                </svg>
            `;

        const svgBlob = new Blob([data], {
          type: "image/svg+xml;charset=utf-8",
        });
        const url = URL.createObjectURL(svgBlob);
        const img = new Image();

        img.onload = function () {
          ctx.clearRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          console.log("Capture complete!");
        };

        img.onerror = function () {
          alert(
            "Capture failed. Make sure your HTML is well-formed XML (close your tags!).",
          );
        };

        img.src = url;
      }

      // Hook up the button
      document.getElementById("captureBtn").addEventListener("click", () => {
        takeScreenshot("capture-area", "screenshot-result");
      });
    </script>
  </body>
</html>
